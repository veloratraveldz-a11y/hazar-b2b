<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HAZAR TRAVELS | Billet d'avion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0F172A; --accent: #3B82F6; --turkish-red: #E81932; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F8FAFC; margin: 0; padding-top: 140px; }
        
        /* NAVBAR INTELLIGENTE */
        .nav-hazar { 
            background: var(--primary); 
            position: fixed; 
            top: 0; left: 0; right: 0; 
            z-index: 1000; 
            transition: transform 0.3s ease-in-out;
            padding: 12px 16px;
            border-bottom: 3px solid var(--accent);
        }
        .nav-up { transform: translateY(-100%); }

        .brand-red { color: var(--turkish-red); font-weight: 800; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; }
        
        /* FILTRES SCROLLABLES */
        .filter-wrapper { display: flex; overflow-x: auto; gap: 8px; padding: 10px 0; scrollbar-width: none; }
        .filter-wrapper::-webkit-scrollbar { display: none; }
        .filter-btn { flex-shrink: 0; padding: 8px 16px; border-radius: 12px; font-weight: 800; font-size: 10px; text-transform: uppercase; color: #94A3B8; border: 1px solid rgba(255,255,255,0.1); }
        .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* EFFET ZOOM SUR IMAGE (REMIS) */
        .card-flight { background: white; border-radius: 28px; overflow: hidden; border: 1px solid #E2E8F0; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-flight:hover { transform: translateY(-10px); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); }
        
        .img-container { height: 220px; position: relative; overflow: hidden; background: #CBD5E1; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.8s ease; }
        .card-flight:hover .img-container img { transform: scale(1.1); } /* LE ZOOM EST ICI */
        
        .airline-label { color: var(--turkish-red); font-weight: 800; font-size: 13px; text-transform: uppercase; border-left: 4px solid var(--turkish-red); padding-left: 12px; margin: 15px 0; }
    </style>
</head>
<body>

    <nav id="navbar" class="nav-hazar shadow-xl">
        <div class="max-w-7xl mx-auto">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white rounded-lg flex items-center justify-center text-slate-900 font-black text-xl italic shadow-lg">H</div>
                <div>
                    <h1 class="text-white font-black text-lg uppercase italic leading-none">Hazar Travels</h1>
                    <p class="brand-red">Billet d'avion</p>
                </div>
            </div>
            <div class="filter-wrapper">
                <button onclick="applyFilter('all')" id="btn-all" class="filter-btn active">Tout</button>
                <button onclick="applyFilter('4')" id="btn-4" class="filter-btn">4 Jours</button>
                <button onclick="applyFilter('5')" id="btn-5" class="filter-btn">5 Jours</button>
                <button onclick="applyFilter('7')" id="btn-7" class="filter-btn">7 Jours</button>
                <button onclick="applyFilter('8')" id="btn-8" class="filter-btn">8 Jours</button>
                <button onclick="applyFilter('organise')" id="btn-organise" class="filter-btn text-amber-500 border-amber-500/20">Organisés</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 pb-12">
        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10"></div>
    </main>

    <script>
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQikVMr3Z3Yk4u5zydpB_UZyjgGJ8fUWGaK0ZG2BXid9ZyLxOi9moJwyDyKT0qbBHyEdNbfp3xyaKa3/pub?gid=0&single=true&output=csv";
        let dataStore = [];

        // Scroll Intelligent
        let lastPos = window.pageYOffset;
        window.onscroll = () => {
            let nowPos = window.pageYOffset;
            const nav = document.getElementById("navbar");
            if (nowPos > lastPos && nowPos > 120) nav.classList.add("nav-up");
            else nav.classList.remove("nav-up");
            lastPos = nowPos;
        }

        async function load() {
            try {
                const res = await fetch(`${SHEET_URL}&nocache=${Date.now()}`);
                const text = await res.text();
                const lines = text.split(/\r?\n/).filter(l => l.trim().length > 20);
                const sep = lines[0].includes(';') ? ';' : ',';

                dataStore = lines.slice(1).map(line => {
                    const c = line.split(sep).map(field => field.replace(/"/g, '').trim());
                    
                    // TRADUCTEUR DE COMPAGNIES (POUR LES CLIENTS)
                    let fullAirline = c[5] || "Hazar Travels";
                    const code = fullAirline.toLowerCase();
                    if (code.includes('tk')) fullAirline = "Turkish Airlines";
                    else if (code.includes('ah')) fullAirline = "Air Algérie";
                    else if (code.includes('tu')) fullAirline = "Tunisair";
                    else if (code.includes('v7')) fullAirline = "Volotea";

                    const dayMatch = (c[3] || "").match(/\d+/);

                    return {
                        date: c[0] || "",
                        dest: c[1] || "",
                        prix: c[2] || "",
                        duree: c[3] || "",
                        filterId: dayMatch ? dayMatch[0] : "",
                        bag: c[4] || "Non spécifié",
                        airline: fullAirline,
                        plan: c[6] || "",
                        // FIX IMAGE : On prend bien la colonne 9 (index 8)
                        image: (c[8] && c[8].trim().startsWith('http')) ? c[8].trim() : "https://images.unsplash.com/photo-1436491865332-7a61a109cc05?w=800",
                        isOrg: line.toLowerCase().includes("organise") || (c[1] || "").toLowerCase().includes("voyage")
                    };
                }).filter(i => i.dest.length > 2);
                
                display(dataStore);
            } catch (e) { console.error(e); }
        }

        function display(list) {
            const container = document.getElementById('grid');
            container.innerHTML = "";
            list.forEach(item => {
                container.innerHTML += `
                <div class="card-flight shadow-lg">
                    <div class="img-container">
                        <img src="${item.image}" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1436491865332-7a61a109cc05?w=800'">
                        <div class="absolute top-5 left-5 px-3 py-1.5 text-[9px] font-black text-white uppercase rounded-xl tracking-widest ${item.isOrg ? 'bg-amber-500' : 'bg-slate-900'} shadow-lg">
                            ${item.isOrg ? 'Voyage Organisé' : 'Billet Flash'}
                        </div>
                    </div>
                    <div class="p-8">
                        <h2 class="text-2xl font-black text-slate-900 uppercase italic tracking-tighter leading-tight">${item.dest}</h2>
                        <p class="text-slate-400 font-bold text-[10px] uppercase mt-2 mb-4 tracking-widest">${item.date} — <span class="text-blue-600">${item.duree}</span></p>
                        <div class="airline-label">${item.airline}</div>
                        <div class="bg-slate-50 p-5 rounded-[24px] mb-6 border border-slate-100">
                            <div class="flex justify-between items-center mb-4">
                                <div><p class="text-[9px] font-bold text-slate-400 uppercase">Tarif</p><span class="text-3xl font-black text-slate-900">${item.prix} <small class="text-xs">DA</small></span></div>
                                <div class="text-right"><p class="text-[9px] font-bold text-slate-400 uppercase">Bagage</p><span class="text-xs font-black text-slate-700 italic border-b-2 border-blue-200">${item.bag}</span></div>
                            </div>
                            <p class="text-[11px] text-slate-600 font-bold italic leading-relaxed pt-4 border-t border-slate-200">${item.plan}</p>
                        </div>
                        <a href="https://wa.me/213558332601?text=Salam Hazar Travels, je réserve : ${item.dest}" target="_blank" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black text-[11px] uppercase tracking-widest flex items-center justify-center gap-4 active:scale-95 transition-all shadow-xl">RÉSERVER <i class="fab fa-whatsapp text-xl text-green-400"></i></a>
                    </div>
                </div>`;
            });
        }

        function applyFilter(cat) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + cat).classList.add('active');
            if (cat === 'all') display(dataStore);
            else if (cat === 'organise') display(dataStore.filter(i => i.isOrg));
            else display(dataStore.filter(i => i.filterId === cat));
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        load();
    </script>
</body>
</html>
