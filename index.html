<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELORA TRAVEL | Luxury Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        :root { --blue: #0A1E3B; --gold: #C5A059; --accent: #E31C1C; }
        body { background: #F4F7FA; font-family: 'Plus Jakarta Sans', sans-serif; padding-top: 170px; }
        
        /* Glassmorphism Header */
        header { background: var(--blue); position: fixed; top: 0; left: 0; right: 0; z-index: 1000; border-bottom: 4px solid var(--gold); }
        
        /* Filter System */
        .filter-container { background: rgba(0,0,0,0.2); padding: 12px; display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; }
        .filter-btn { background: white; color: var(--blue); padding: 8px 20px; border-radius: 10px; font-weight: 800; font-size: 12px; text-transform: uppercase; transition: 0.3s; white-space: nowrap; }
        .filter-btn.active { background: var(--gold); color: white; transform: scale(1.05); }

        /* Aggressive Card Design */
        .card { background: white; border-radius: 24px; overflow: hidden; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 1px solid #E2E8F0; display: flex; flex-direction: column; height: 100%; }
        .card:hover { transform: translateY(-12px); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); border-color: var(--gold); }
        
        .img-container { height: 240px; position: relative; overflow: hidden; background: #DAE1E7; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .promo-badge { position: absolute; top: 15px; right: 15px; background: var(--accent); color: white; padding: 5px 12px; border-radius: 8px; font-size: 10px; font-weight: 900; text-transform: uppercase; z-index: 10; }
        .category-tag { position: absolute; top: 15px; left: 15px; background: var(--blue); color: var(--gold); padding: 5px 12px; border-radius: 8px; font-size: 9px; font-weight: 800; text-transform: uppercase; z-index: 10; }

        .price-text { color: var(--accent); font-size: 32px; font-weight: 800; line-height: 1; }
        
        /* Section Dividers */
        .section-title { grid-column: 1 / -1; display: flex; align-items: center; gap: 20px; margin: 40px 0 20px; }
        .section-title h2 { color: var(--blue); font-weight: 900; text-transform: uppercase; letter-spacing: 1px; font-size: 14px; white-space: nowrap; }
        .section-title div { height: 2px; background: #CBD5E1; width: 100%; }

        /* Modal Ultra-Pro */
        #detailsModal { display: none; position: fixed; inset: 0; background: rgba(10, 30, 59, 0.95); z-index: 2000; backdrop-filter: blur(8px); align-items: center; justify-content: center; padding: 15px; }
        .modal-content { background: white; width: 100%; max-width: 600px; border-radius: 30px; padding: 35px; max-height: 85vh; overflow-y: auto; position: relative; }
        .itinerary-item { border-left: 3px solid var(--gold); padding-left: 20px; margin-bottom: 20px; position: relative; }
        .itinerary-item::before { content: ''; position: absolute; left: -9px; top: 0; width: 15px; height: 15px; background: var(--gold); border-radius: 50%; border: 3px solid white; }
    </style>
</head>
<body>

<header>
    <div class="max-w-7xl mx-auto p-4 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center shadow-inner">
                <span class="text-[var(--blue)] font-black text-2xl">V</span>
            </div>
            <div>
                <h1 class="text-white font-black text-xl tracking-tighter">VELORA TRAVEL</h1>
                <p class="text-[var(--gold)] text-[10px] font-bold uppercase tracking-[3px]">Hazar Travels B2B</p>
            </div>
        </div>
        <a href="tel:0558332601" class="bg-[var(--gold)] text-white px-6 py-3 rounded-xl font-black text-xs shadow-lg hover:scale-105 transition">CONTACTER</a>
    </div>
    <div class="filter-container">
        <button class="filter-btn active" onclick="applyFilter('ALL', this)">Voir Tout</button>
        <button class="filter-btn" onclick="applyFilter('VOYAGE', this)">Voyages Organisés</button>
        <button class="filter-btn" onclick="applyFilter('BILLET', this)">Billetterie</button>
    </div>
</header>

<main class="max-w-7xl mx-auto p-6">
    <div id="mainGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <!-- AGGRESSIVE INJECTION POINT -->
    </div>
</main>

<div id="detailsModal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h2 id="modalDest" class="text-3xl font-black text-[var(--blue)] mb-2 uppercase"></h2>
        <div id="modalInfo" class="mb-6 flex gap-4 text-xs font-bold text-gray-400 uppercase"></div>
        <div id="modalData" class="space-y-4"></div>
        <button onclick="closeModal()" class="mt-8 w-full bg-[var(--blue)] text-white py-4 rounded-xl font-bold uppercase tracking-widest">Fermer</button>
    </div>
</div>

<script>
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQikVMr3Z3Yk4u5zydpB_UZyjgGJ8fUWGaK0ZG2BXid9ZyLxOi9moJwyDyKT0qbBHyEdNbfp3xyaKa3/pub?gid=0&single=true&output=csv";
    let database = [];

    async function syncDatabase() {
        try {
            // THE CACHE KILLER: Forces Google to provide the absolute latest version
            const response = await fetch(`${SHEET_URL}&cachebust=${Date.now()}`);
            const rawData = await response.text();
            
            // EXTREME PARSER: Handles complex CSVs with quotes and newlines
            const rows = rawData.split(/\r?\n(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            const cleanRows = rows.slice(1).map(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim());
                
                // DATA RECONSTRUCTION LOGIC
                let img = cols[8] || "";
                if (img.includes("http")) {
                    // Force-cleans the Lisbonne/Billet error
                    img = img.split(/[A-Z]{4,}/)[0]; 
                }

                let cat = (cols[9] || "").toUpperCase();
                let type = cat.includes("VOYAG") ? "VOYAGE" : "BILLET";

                return {
                    date: cols[0], dest: cols[1], prix: cols[2], duree: cols[3],
                    bag: cols[4], air: cols[5], plan: cols[6], status: cols[7],
                    img: img, cat: type, program: cols[10]
                };
            }).filter(item => item.dest);

            database = cleanRows;
            render(database);
        } catch (err) {
            console.error("CRITICAL ERROR:", err);
        }
    }

    function render(items) {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = "";

        // Sort: Voyages Organisés always on top
        const sorted = [...items].sort((a,b) => (a.cat === "VOYAGE" ? -1 : 1));

        let lastCat = "";
        sorted.forEach(item => {
            if(item.cat !== lastCat) {
                const divider = document.createElement('div');
                divider.className = "section-title";
                divider.innerHTML = `<h2>${item.cat === 'VOYAGE' ? 'Packages Voyages Organisés' : 'Vols & Billetterie'}</h2><div></div>`;
                grid.appendChild(divider);
                lastCat = item.cat;
            }

            const card = document.createElement('div');
            card.className = "card";
            card.innerHTML = `
                <div class="img-container">
                    <div class="category-tag">${item.cat}</div>
                    <div class="promo-badge">${item.status}</div>
                    <img src="${item.img}" onerror="this.src='https://images.unsplash.com/photo-1436491865332-7a61a109c053?w=800'">
                </div>
                <div class="p-6 flex flex-col flex-grow">
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="text-xl font-black text-[var(--blue)] uppercase leading-tight">${item.dest}</h3>
                        <img src="https://www.gstatic.com/flights/airline_logos/70px/${item.air.split('/')[0]}.png" class="h-5 w-auto rounded border">
                    </div>
                    <p class="text-[10px] font-extrabold text-gray-400 uppercase mb-4">${item.date} • ${item.duree}</p>
                    <div class="flex items-center gap-2 mb-6">
                        <span class="bg-gray-100 text-[var(--blue)] text-[9px] font-black px-2 py-1 rounded-md uppercase"><i class="fas fa-suitcase mr-1"></i> ${item.bag}</span>
                    </div>
                    <div class="mt-auto">
                        <div class="flex items-baseline gap-1 mb-4">
                            <span class="price-text">${item.prix}</span>
                            <span class="text-xs font-bold text-gray-300">DA</span>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick='showDetails(${JSON.stringify(item).replace(/'/g, "&apos;")})' class="bg-gray-100 text-[var(--blue)] py-3 rounded-xl font-black text-[10px] uppercase">Détails</button>
                            <a href="https://wa.me/213558332601?text=RESERVATION: ${item.dest}" target="_blank" class="bg-[#25D366] text-white py-3 rounded-xl font-black text-[10px] uppercase text-center shadow-md"><i class="fab fa-whatsapp mr-1"></i> Réserver</a>
                        </div>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function applyFilter(type, btn) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if(type === 'ALL') render(database);
        else render(database.filter(i => i.cat === type));
    }

    window.showDetails = function(item) {
        document.getElementById('modalDest').innerText = item.dest;
        document.getElementById('modalInfo').innerText = `${item.date} | ${item.duree} | Bagage: ${item.bag}`;
        const container = document.getElementById('modalData');
        container.innerHTML = "";

        if(item.cat === "VOYAGE") {
            const days = item.program.split('\n').filter(d => d.trim() !== "");
            days.forEach(day => {
                const div = document.createElement('div');
                div.className = "itinerary-item text-sm font-medium text-gray-700";
                div.innerText = day;
                container.appendChild(div);
            });
        } else {
            container.innerHTML = `
                <div class="bg-blue-50 p-6 rounded-2xl border-2 border-dashed border-blue-200">
                    <p class="text-xs font-black text-[var(--blue)] uppercase mb-2">Plan de Vol Officiel</p>
                    <p class="text-lg font-bold text-[var(--blue)]">${item.plan}</p>
                </div>
            `;
        }
        document.getElementById('detailsModal').style.display = 'flex';
    }

    window.closeModal = () => document.getElementById('detailsModal').style.display = 'none';

    syncDatabase();
</script>
</body>
</html>
