<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRESTA TOURS | Plateforme de Réservation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        
        :root { --blue: #0A1E3B; --gold: #C5A059; --red: #E31C1C; }
        
        body { 
            background: #F8FAFC; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            padding-top: 180px; 
            margin: 0;
        }

        /* --- SMART HEADER --- */
        header { 
            background: var(--blue); 
            position: fixed; 
            top: 0; left: 0; right: 0; 
            z-index: 1000; 
            border-bottom: 3px solid var(--gold);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .header-hidden { transform: translateY(-100%); }

        /* --- SOCIAL BUTTONS --- */
        .social-btn { 
            background: white; 
            width: 32px; height: 32px; 
            display: flex; align-items: center; justify-content: center; 
            border-radius: 8px; transition: 0.2s;
        }
        .social-btn:hover { transform: scale(1.1); }
        .social-btn i.fa-facebook-f { color: #1877F2; }
        .social-btn i.fa-instagram { color: #E4405F; }
        .social-btn i.fa-tiktok { color: #000000; }

        /* --- FILTER BAR --- */
        .filter-bar { 
            display: flex; gap: 12px; 
            overflow-x: auto; padding: 15px 20px; 
            background: rgba(0,0,0,0.15); 
            scrollbar-width: none; 
        }
        .filter-btn { 
            background: white; padding: 10px 20px; 
            border-radius: 12px; font-weight: 800; 
            font-size: 11px; white-space: nowrap; 
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .filter-btn.active { background: var(--gold); color: white; }

        /* --- CARD STYLING --- */
        .card { 
            background: white; border-radius: 28px; 
            overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.04); 
            height: 100%; display: flex; flex-direction: column; 
            transition: all 0.3s ease; border: 1px solid #edf2f7;
        }
        .card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
        .img-box { height: 230px; position: relative; background: #eee; overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .card:hover .img-box img { transform: scale(1.05); }
        
        .badge { 
            position: absolute; top: 15px; left: 15px; 
            background: var(--red); color: white; 
            padding: 6px 14px; border-radius: 10px; 
            font-size: 10px; font-weight: 900;
        }
        .price-tag { color: var(--red); font-size: 34px; font-weight: 800; letter-spacing: -1.5px; }

        /* --- ENHANCED MODAL --- */
        #modal { 
            display: none; position: fixed; inset: 0; 
            background: rgba(10, 30, 59, 0.9); z-index: 2000; 
            align-items: center; justify-content: center; padding: 20px; 
            backdrop-filter: blur(8px); 
        }
        .modal-inner { 
            background: white; padding: 35px; 
            border-radius: 32px; max-width: 500px; width: 100%; 
            position: relative; max-height: 85vh; overflow-y: auto;
        }

        /* Timeline View (Voyages) */
        .timeline-container { border-left: 2px solid var(--gold); margin-left: 10px; padding-left: 20px; }
        .timeline-item { position: relative; margin-bottom: 20px; font-size: 14px; color: #444; line-height: 1.6; }
        .timeline-item::before {
            content: ""; position: absolute; left: -27px; top: 5px;
            width: 12px; height: 12px; background: var(--gold);
            border-radius: 50%; border: 2px solid white;
        }

        /* Ticket View (Billets) */
        .flight-card { background: #f8fafc; border-radius: 12px; padding: 12px; border: 1px solid #e2e8f0; }
        .flight-row { display: flex; align-items: center; gap: 10px; font-weight: 700; color: var(--blue); font-size: 13px; }
        .flight-sep { border-left: 2px dashed var(--gold); height: 15px; margin: 5px 8px; }

    </style>
</head>
<body>

<header id="smartHeader">
    <div class="p-4 flex justify-between items-center max-w-7xl mx-auto">
        <div class="flex items-center gap-4">
            <div class="bg-white text-[var(--blue)] w-12 h-12 flex items-center justify-center font-black text-3xl rounded-xl shadow-lg">P</div>
            <div>
                <h1 class="text-white font-extrabold text-xl tracking-tight">PRESTA TOURS</h1>
                <div class="flex gap-2.5 mt-2">
                    <a href="https://www.facebook.com/prestatour/" target="_blank" class="social-btn"><i class="fab fa-facebook-f"></i></a>
                    <a href="https://www.instagram.com/presta_tours_/" target="_blank" class="social-btn"><i class="fab fa-instagram"></i></a>
                    <a href="https://www.tiktok.com/@prestatours" target="_blank" class="social-btn"><i class="fab fa-tiktok"></i></a>
                </div>
            </div>
        </div>
        <a href="tel:0558332601" class="bg-[var(--gold)] text-white px-6 py-3 rounded-2xl font-black text-xs uppercase shadow-lg">Appeler</a>
    </div>
    <div class="filter-bar">
        <button class="filter-btn active" onclick="filter('all', this)">Tous les Offres</button>
        <button class="filter-btn" onclick="filter('VOYAGE ORGANISEE', this)">Voyages Organisés</button>
        <button class="filter-btn" onclick="filter('BILLET', this)">Billets Seuls</button>
    </div>
</header>

<main class="p-6 max-w-7xl mx-auto">
    <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
</main>

<div id="modal" onclick="this.style.display='none'">
    <div class="modal-inner" onclick="event.stopPropagation()">
        <h2 id="m-title" class="text-2xl font-black mb-6 uppercase text-[var(--blue)] border-b pb-4"></h2>
        <div id="m-body"></div>
        <button onclick="document.getElementById('modal').style.display='none'" class="mt-8 w-full bg-[var(--blue)] text-white py-4 rounded-2xl font-bold uppercase">Fermer</button>
    </div>
</div>

<script>
    let allData = [];
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQikVMr3Z3Yk4u5zydpB_UZyjgGJ8fUWGaK0ZG2BXid9ZyLxOi9moJwyDyKT0qbBHyEdNbfp3xyaKa3/pub?gid=0&single=true&output=csv";

    async function load() {
        try {
            const r = await fetch(`${CSV_URL}&t=${Date.now()}`);
            const text = await r.text();
            const lines = text.split("\n");
            
            allData = lines.slice(1).map(line => {
                const parts = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return {
                    date: parts[0]?.replace(/"/g, "").trim(),
                    dest: parts[1]?.replace(/"/g, "").trim(),
                    prix: parts[2]?.replace(/"/g, "").trim(),
                    duree: parts[3]?.replace(/"/g, "").trim(),
                    bag: parts[4]?.replace(/"/g, "").trim(),
                    air: parts[5]?.replace(/"/g, "").trim(),
                    plan: parts[6]?.replace(/"/g, "").trim(),
                    places: parts[7]?.replace(/"/g, "").trim(),
                    img: parts[8]?.replace(/"/g, "").trim(),
                    cat: parts[9]?.replace(/"/g, "").toUpperCase().trim(),
                    program: parts[10]?.replace(/"/g, "").trim()
                };
            }).filter(i => i.dest);
            display(allData);
        } catch (e) { console.error("Error:", e); }
    }

    function filter(cat, btn) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        display(cat === 'all' ? allData : allData.filter(i => i.cat === cat));
    }

    function display(items) {
        const grid = document.getElementById('grid');
        grid.innerHTML = "";
        items.forEach((i, idx) => {
            const logos = i.air.split(/[/,]+/).map(c => 
                `<img class="h-4 bg-white p-0.5 rounded border" src="https://www.gstatic.com/flights/airline_logos/70px/${c.trim()}.png">`
            ).join('');

            grid.innerHTML += `
            <div class="card">
                <div class="img-box">
                    <div class="badge">${i.places}</div>
                    <img src="${i.img}" onerror="this.src='https://images.unsplash.com/photo-1436491865332-7a61a109c053?w=800'">
                    <div class="absolute bottom-3 left-3 flex gap-1.5">${logos}</div>
                </div>
                <div class="p-7 flex-grow flex flex-col">
                    <h3 class="text-2xl font-black uppercase text-[var(--blue)] mb-1">${i.dest}</h3>
                    <p class="text-xs font-bold text-gray-400 mb-5 uppercase">${i.date} • ${i.duree}</p>
                    <div class="mb-6 flex gap-2">
                        <span class="bg-blue-50 text-[var(--blue)] px-3 py-1.5 rounded-lg text-[10px] font-extrabold uppercase"><i class="fas fa-suitcase"></i> ${i.bag}</span>
                    </div>
                    <div class="mb-8 flex items-baseline gap-1">
                        <span class="price-tag">${i.prix}</span><span class="text-sm font-black text-gray-300">DA</span>
                    </div>
                    <div class="mt-auto space-y-3">
                        <button onclick="openEnhancedModal(${allData.indexOf(i)})" class="w-full border-2 border-gray-100 py-3 rounded-2xl font-black text-[10px] uppercase text-gray-600 hover:border-[var(--gold)] transition-all">Voir Programme</button>
                        <button onclick="window.open('https://wa.me/213558332601?text=Intéressé par: ${i.dest}')" class="w-full bg-[#25D366] text-white py-4 rounded-2xl font-black text-sm uppercase flex items-center justify-center gap-2 shadow-lg"><i class="fab fa-whatsapp"></i> Réserver</button>
                    </div>
                </div>
            </div>`;
        });
    }

    function openEnhancedModal(index) {
        const item = allData[index];
        document.getElementById('m-title').innerText = item.dest;
        const body = document.getElementById('m-body');
        
        if (item.cat === "BILLET") {
            const legs = item.program.split('|');
            body.innerHTML = legs.map((l, i) => `
                <div class="flight-card"><div class="flight-row"><i class="fas fa-plane text-[var(--gold)]"></i> ${l.trim()}</div></div>
                ${i < legs.length-1 ? '<div class="flight-sep"></div>' : ''}
            `).join('');
        } else {
            const days = item.program.split('<br>');
            body.innerHTML = `<div class="timeline-container">${days.map(d => `<div class="timeline-item">${d.trim()}</div>`).join('')}</div>`;
        }
        document.getElementById('modal').style.display = 'flex';
    }

    window.addEventListener('scroll', () => {
        const current = window.pageYOffset;
        header.classList.toggle('header-hidden', current > 150 && current > lastScroll);
        lastScroll = current;
    });
    let lastScroll = 0;
    load();
</script>
</body>
</html>
