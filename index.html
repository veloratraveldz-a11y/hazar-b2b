<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAZAR TRAVELS B2B | OFFRES FLASH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        .flash-header { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
        .card-hover { transition: all 0.3s ease; border: 1px solid #f1f5f9; }
        .card-hover:hover { transform: translateY(-5px); border-color: #3b82f6; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        #adminPanel { display: none; }
        .admin-mode #adminPanel { display: block; }
    </style>
</head>
<body class="bg-[#F8FAFC]">

    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md px-6 py-4 border-b border-slate-200">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3 cursor-pointer" onclick="toggleAdmin()">
                <div class="w-10 h-10 bg-sky-600 rounded-xl flex items-center justify-center text-white font-black text-xl">H</div>
                <h1 class="text-xl font-black tracking-tight text-slate-800">HAZAR <span class="text-sky-600 uppercase italic">Travels</span></h1>
            </div>
            <div class="bg-red-50 text-red-600 px-4 py-2 rounded-full font-bold text-[10px] uppercase tracking-widest animate-pulse">
                Vente Flash Live ⚡
            </div>
        </div>
    </nav>

    <div id="adminPanel" class="max-w-7xl mx-auto px-6 mt-6">
        <div class="bg-white p-6 rounded-2xl border-2 border-dashed border-sky-200 shadow-sm">
            <h3 class="font-bold mb-4">Ajouter une Offre Manuelle</h3>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="text" id="manualTitle" placeholder="Ville (ex: Oran)" class="border p-2 rounded-lg">
                <input type="text" id="manualDate" placeholder="Dates" class="border p-2 rounded-lg">
                <input type="text" id="manualPrice" placeholder="Prix" class="border p-2 rounded-lg">
                <button onclick="addManual()" class="bg-sky-600 text-white rounded-lg font-bold">Ajouter</button>
            </div>
        </div>
    </div>

    <header class="flash-header py-12 px-6 text-white text-center">
        <h2 class="text-3xl font-extrabold mb-2 uppercase tracking-tighter">Promotions Istanbul 2026 🇹🇷</h2>
        <p class="text-slate-400">Consultez les plans de vol et réservez instantanément</p>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12">
        
        <div class="mb-16">
            <div class="flex items-center gap-4 mb-8">
                <span class="bg-sky-600 text-white p-2 rounded-lg"><i class="fas fa-plane-departure"></i></span>
                <h3 class="text-2xl font-black text-slate-800 uppercase">Départ Alger (TK)</h3>
            </div>
            <div id="gridAlger" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <div class="mb-16">
            <div class="flex items-center gap-4 mb-8">
                <span class="bg-emerald-600 text-white p-2 rounded-lg"><i class="fas fa-plane-departure"></i></span>
                <h3 class="text-2xl font-black text-slate-800 uppercase">Départ Constantine (AH)</h3>
            </div>
            <div id="gridConst" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <div id="sectionOran" class="hidden">
            <div class="flex items-center gap-4 mb-8">
                <span class="bg-orange-600 text-white p-2 rounded-lg"><i class="fas fa-plane-departure"></i></span>
                <h3 class="text-2xl font-black text-slate-800 uppercase text-orange-600">Départ Oran</h3>
            </div>
            <div id="gridOran" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
    </main>

    <div id="modal">
        <div class="bg-white rounded-3xl p-8 max-w-md w-[90%] shadow-2xl relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600"><i class="fas fa-times-circle text-2xl"></i></button>
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        const myPhone = "213558332601";
        const pass = "karimzerouaia2026@";

        const dataAlger = [
            { id: 1, date: "05 Mai - 08 Mai", price: "42.900", plan: "ALLER: 18h05 -> 23h40 | RETOUR: 21h50 -> 23h30", company: "Turkish" },
            { id: 2, date: "06 Mai - 09 Mai", price: "42.900", plan: "ALLER: 18h05 -> 23h40 | RETOUR: 21h50 -> 23h30", company: "Turkish" },
            { id: 3, date: "12 Mai - 15 Mai", price: "42.900", plan: "ALLER: 18h05 -> 23h40 | RETOUR: 19h40 -> 21h25", company: "Turkish" },
            { id: 4, date: "13 Mai - 16 Mai", price: "42.900", plan: "ALLER: 18h05 -> 23h40 | RETOUR: 07h55 -> 09h45", company: "Turkish" },
            { id: 5, date: "19 Mai - 22 Mai", price: "42.900", plan: "ALLER: 18h05 -> 23h40 | RETOUR: 19h40 -> 21h25", company: "Turkish" },
            { id: 6, date: "20 Mai - 23 Mai", price: "42.900", plan: "ALLER: 18h05 -> 23h40 | RETOUR: 21h50 -> 23h30", company: "Turkish" }
        ];

        const dataConst = [
            { id: 7, date: "09 Mai - 17 Mai", price: "45.000", bag: "56 KG", plan: "Air Algérie | Bagages: 56kg Soute + 10kg Cabine. Vol direct Constantine-Istanbul.", company: "Air Algérie" },
            { id: 8, date: "18 Mai - 26 Mai", price: "45.000", bag: "56 KG", plan: "Air Algérie | Bagages: 56kg Soute + 10kg Cabine. Vol direct Constantine-Istanbul.", company: "Air Algérie" }
        ];

        function render() {
            const gA = document.getElementById('gridAlger');
            const gC = document.getElementById('gridConst');
            gA.innerHTML = ''; gC.innerHTML = '';

            dataAlger.forEach(f => gA.innerHTML += card(f, 'sky'));
            dataConst.forEach(f => gC.innerHTML += card(f, 'emerald'));
        }

        function card(f, color) {
            return `
                <div class="bg-white p-6 rounded-2xl shadow-sm card-hover">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-xs font-bold text-${color}-600 uppercase tracking-widest">${f.company}</span>
                        <span class="bg-red-50 text-red-600 px-2 py-1 rounded text-[9px] font-black">PROMO</span>
                    </div>
                    <h4 class="text-lg font-bold text-slate-800">${f.date}</h4>
                    <p class="text-2xl font-black text-slate-900 mt-2">${f.price} <small class="text-xs font-normal">DA</small></p>
                    ${f.bag ? `<p class="text-emerald-600 text-sm font-bold mt-1"><i class="fas fa-luggage-cart"></i> Bagage: ${f.bag}</p>` : ''}
                    <button onclick="openPlan('${f.date}', '${f.price}', '${f.plan}')" class="w-full mt-6 py-3 border-2 border-slate-100 rounded-xl font-bold text-slate-600 hover:bg-slate-50 transition">
                        Voir Plan de Vol
                    </button>
                </div>
            `;
        }

        function openPlan(date, price, plan) {
            const modal = document.getElementById('modal');
            const content = document.getElementById('modalContent');
            const msg = encodeURIComponent(`Bonjour Hazar Travels, je suis intéressé par le vol du ${date} à ${price} DA. Pouvons-nous confirmer?`);
            
            content.innerHTML = `
                <h3 class="text-xl font-black text-slate-800 mb-4">Détails du Vol</h3>
                <div class="bg-slate-50 p-4 rounded-xl text-sm text-slate-600 leading-relaxed mb-6">
                    <p class="font-bold text-slate-800 mb-2 underline">Plan de Vol:</p>
                    ${plan}
                </div>
                <div class="flex flex-col gap-3">
                    <a href="https://wa.me/${myPhone}?text=${msg}" class="bg-green-500 text-white py-4 rounded-xl text-center font-bold shadow-lg shadow-green-100">
                        <i class="fab fa-whatsapp mr-2"></i> Réserver via WhatsApp
                    </a>
                    <button onclick="closeModal()" class="text-slate-400 font-bold text-sm py-2">Fermer</button>
                </div>
            `;
            modal.style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        
        function toggleAdmin() {
            const promptPass = prompt("Admin Password:");
            if(promptPass === pass) document.body.classList.toggle('admin-mode');
        }

        render();
    </script>
</body>
</html>
