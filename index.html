<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELORA TRAVEL | Expert Turkish Airlines</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0F172A; --accent: #3B82F6; --whatsapp: #25D366; --turkish-red: #E81932; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F1F5F9; }
        .nav-velora { background: var(--primary); border-bottom: 4px solid var(--accent); position: sticky; top: 0; z-index: 50; }
        
        /* Animation Zoom */
        .img-container { height: 230px; overflow: hidden; position: relative; background: #cbd5e1; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.8s ease; }
        .card-flight:hover .img-container img { transform: scale(1.1); }

        /* LOGO BOX - Version Haute Visibilité */
        .logo-badge { background: white; padding: 6px 14px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; min-width: 90px; height: 48px; position: absolute; top: 15px; right: 15px; z-index: 40; border: 1px solid #f1f5f9; }
        .logo-badge img { height: 24px; width: auto; object-fit: contain; display: block !important; }

        /* Filtres Styles */
        .filter-btn { transition: 0.3s; color: #94A3B8; cursor: pointer; padding: 10px 18px; border-radius: 12px; font-weight: 800; font-size: 11px; text-transform: uppercase; border: 1px solid rgba(255,255,255,0.1); }
        .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4); }
        
        .card-flight { background: white; border-radius: 28px; transition: 0.4s; border: 1px solid #E2E8F0; overflow: hidden; display: flex; flex-direction: column; }
        .card-flight:hover { transform: translateY(-8px); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); }
        
        .badge-type { position: absolute; top: 15px; left: 15px; z-index: 30; font-size: 10px; font-weight: 900; text-transform: uppercase; padding: 7px 14px; border-radius: 50px; color: white; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <nav class="nav-velora px-6 py-6">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center text-slate-900 font-black text-2xl italic shadow-xl">V</div>
                <div>
                    <h1 class="text-white font-black text-2xl uppercase italic tracking-tighter leading-none">Velora Travel</h1>
                    <p class="text-sky-400 text-[10px] font-bold uppercase tracking-[0.3em] mt-1">Spécialiste Turkish Airlines</p>
                </div>
            </div>
            <div class="flex flex-wrap justify-center gap-2">
                <button onclick="filterOffers('all')" id="btn-all" class="filter-btn active">Toutes les offres</button>
                <button onclick="filterOffers('4')" id="btn-4" class="filter-btn">4 Jours</button>
                <button onclick="filterOffers('7')" id="btn-7" class="filter-btn">7 Jours</button>
                <button onclick="filterOffers('8')" id="btn-8" class="filter-btn">8 Jours</button>
                <button onclick="filterOffers('organise')" id="btn-organise" class="filter-btn border-amber-500/50 text-amber-500">Voyages Organisés</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div id="flight-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            </div>
    </main>

    <script>
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQikVMr3Z3Yk4u5zydpB_UZyjgGJ8fUWGaK0ZG2BXid9ZyLxOi9moJwyDyKT0qbBHyEdNbfp3xyaKa3/pub?gid=0&single=true&output=csv";
        
        const logos = {
            tk: "https://upload.wikimedia.org/wikipedia/commons/thumb/2/21/Turkish_Airlines_logo_2019.svg/1280px-Turkish_Airlines_logo_2019.svg.png",
            ah: "https://upload.wikimedia.org/wikipedia/fr/thumb/3/36/Air_Alg%C3%A9rie_logo.svg/1200px-Air_Alg%C3%A9rie_logo.svg.png",
            tu: "https://upload.wikimedia.org/wikipedia/fr/thumb/c/c5/Tunisair_logo.svg/1200px-Tunisair_logo.svg.png"
        };

        let allOffers = [];

        async function init() {
            try {
                const res = await fetch(csvUrl + '&v=' + Date.now());
                const text = await res.text();
                const rows = text.split(/\r?\n/).filter(r => r.length > 20);
                
                // Détection intelligente du séparateur
                const sep = rows[0].includes(';') ? ';' : ',';
                
                allOffers = rows.slice(1).map(row => {
                    const cols = row.split(sep).map(c => c.replace(/"/g, '').trim());
                    if (cols.length < 5) return null;

                    const dest = cols[1] || "";
                    const airLabel = (cols[5] || "").toLowerCase();
                    
                    // Logique de détection de logo ultra-robuste
                    let finalLogo = null;
                    if (airLabel.includes("tk")) finalLogo = logos.tk;
                    else if (airLabel.includes("ah")) finalLogo = logos.ah;
                    else if (airLabel.includes("tu")) finalLogo = logos.tu;

                    return {
                        date: cols[0] || "",
                        dest: dest,
                        price: cols[2] || "Sur demande",
                        days: cols[3] || "",
                        bag: cols[4] || "23kg",
                        logo: finalLogo,
                        plan: cols[6] || "Contactez-nous pour le plan de vol",
                        isOrg: dest.toLowerCase().includes("organise"),
                        img: (cols[8] && cols[8].length > 15) ? cols[8] : "https://images.unsplash.com/photo-1436491865332-7a61a109cc05?w=800"
                    };
                }).filter(item => item !== null);

                render(allOffers);
            } catch (e) {
                console.error(e);
                document.getElementById('flight-container').innerHTML = "Erreur de connexion au tableau.";
            }
        }

        function render(list) {
            const container = document.getElementById('flight-container');
            container.innerHTML = "";
            
            list.forEach(o => {
                const badgeStyle = o.isOrg ? "bg-amber-500 shadow-amber-200" : "bg-slate-900 shadow-slate-300";
                const badgeLabel = o.isOrg ? "Voyage Organisé" : "Billet Flash";
                const logoHtml = o.logo ? `<div class="logo-badge"><img src="${o.logo}"></div>` : '';

                container.innerHTML += `
                <div class="card-flight">
                    <div class="img-container">
                        <img src="${o.img}" onerror="this.src='https://images.unsplash.com/photo-1436491865332-7a61a109cc05?w=800'">
                        <div class="badge-type ${badgeStyle} shadow-lg">${badgeLabel}</div>
                        ${logoHtml}
                    </div>
                    <div class="p-8 flex flex-col flex-grow">
                        <h4 class="text-2xl font-black text-slate-900 uppercase italic leading-none mb-1">${o.dest}</h4>
                        <p class="text-slate-400 font-bold text-[10px] uppercase mb-5 tracking-widest">${o.date} — <span class="text-blue-600">${o.days}</span></p>
                        
                        <div class="bg-slate-50 p-6 rounded-3xl border border-slate-100 mb-8 flex-grow">
                            <div class="flex justify-between items-end mb-6">
                                <div>
                                    <p class="text-[9px] font-bold text-slate-400 uppercase mb-1">Prix par personne</p>
                                    <span class="text-3xl font-black text-slate-900 tracking-tighter">${o.price} <small class="text-xs font-bold uppercase">DA</small></span>
                                </div>
                                <div class="text-right">
                                    <p class="text-[9px] font-bold text-slate-400 uppercase mb-1">Franchise</p>
                                    <span class="text-xs font-black text-slate-700 italic border-b-2 border-blue-200 pb-0.5">${o.bag}</span>
                                </div>
                            </div>
                            <div class="border-t border-slate-200 pt-5">
                                <p class="text-[10px] font-black text-blue-600 uppercase mb-2 flex items-center">
                                    <i class="fas fa-plane-departure mr-2"></i> INFOS VOLS & PROGRAMME
                                </p>
                                <p class="text-[11px] text-slate-800 font-bold leading-relaxed whitespace-pre-line italic opacity-90">${o.plan}</p>
                            </div>
                        </div>
                        
                        <a href="https://wa.me/213558332601?text=Bonjour Velora Travel, je souhaite réserver pour : ${o.dest} (${o.price} DA)" 
                           target="_blank" 
                           class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black text-[11px] uppercase tracking-[0.15em] flex items-center justify-center gap-4 transition-all hover:bg-slate-800 shadow-xl">
                            RÉSERVER SUR WHATSAPP <i class="fab fa-whatsapp text-xl text-green-400"></i>
                        </a>
                    </div>
                </div>`;
            });
        }

        function filterOffers(type) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + type).classList.add('active');
            if (type === 'all') render(allOffers);
            else if (type === 'organise') render(allOffers.filter(f => f.isOrg));
            else render(allOffers.filter(f => f.days.toLowerCase().includes(type)));
        }

        init();
    </script>
</body>
</html>
