<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELORA TRAVEL | Expert Voyage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0F172A; --accent: #3B82F6; --whatsapp: #25D366; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F1F5F9; }
        
        .nav-velora { background: var(--primary); border-bottom: 3px solid var(--accent); }
        .filter-btn { transition: all 0.3s; color: #94A3B8; cursor: pointer; padding: 8px 16px; border-radius: 12px; font-weight: bold; font-size: 10px; text-transform: uppercase; border: 1px solid rgba(255,255,255,0.1); }
        .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4); }
        
        .card-flight { background: white; border-radius: 24px; transition: all 0.4s; border: 1px solid #E2E8F0; overflow: hidden; display: flex; flex-direction: column; }
        .card-flight:hover { transform: translateY(-8px); box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.15); border-color: var(--accent); }
        
        /* Conteneur Logo - Plus grand et visible */
        .logo-box { background: white; padding: 8px 14px; border-radius: 14px; box-shadow: 0 6px 15px rgba(0,0,0,0.25); display: flex; align-items: center; justify-content: center; min-width: 90px; height: 50px; border: 1px solid #f1f5f9; }
        .logo-box img { height: 28px; width: auto; object-fit: contain; }

        .whatsapp-icon { color: var(--whatsapp); filter: drop-shadow(0 0 3px rgba(37, 211, 102, 0.4)); }
        
        .tag-special { background: linear-gradient(45deg, #F59E0B, #D97706); box-shadow: 0 4px 10px rgba(217, 119, 6, 0.3); }
    </style>
</head>
<body>

    <nav class="nav-velora px-6 py-6 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center text-slate-900 font-black text-2xl shadow-xl">V</div>
                <div>
                    <h1 class="text-white font-black text-2xl uppercase italic leading-none">Velora Travel</h1>
                    <p class="text-sky-400 text-[9px] font-bold uppercase tracking-[0.3em] mt-1 italic">Alger - El Harrach</p>
                </div>
            </div>
            <div class="flex flex-wrap justify-center gap-2">
                <button onclick="filterType('all')" id="btn-all" class="filter-btn active">Tous</button>
                <button onclick="filterType('4')" id="btn-4" class="filter-btn">4 Jours</button>
                <button onclick="filterType('7')" id="btn-7" class="filter-btn">7 Jours</button>
                <button onclick="filterType('8')" id="btn-8" class="filter-btn">8 Jours</button>
                <button onclick="filterType('organise')" id="btn-organise" class="filter-btn border-amber-500/30 text-amber-500">Organisé</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div id="flight-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <script>
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQikVMr3Z3Yk4u5zydpB_UZyjgGJ8fUWGaK0ZG2BXid9ZyLxOi9moJwyDyKT0qbBHyEdNbfp3xyaKa3/pub?gid=0&single=true&output=csv";
        
        const logos = {
            "tk": "https://upload.wikimedia.org/wikipedia/commons/thumb/2/21/Turkish_Airlines_logo_2019.svg/1280px-Turkish_Airlines_logo_2019.svg.png",
            "ah": "https://upload.wikimedia.org/wikipedia/fr/thumb/3/36/Air_Alg%C3%A9rie_logo.svg/1200px-Air_Alg%C3%A9rie_logo.svg.png",
            "tu": "https://upload.wikimedia.org/wikipedia/fr/thumb/c/c5/Tunisair_logo.svg/1200px-Tunisair_logo.svg.png"
        };

        let allFlights = [];

        async function init() {
            try {
                const res = await fetch(csvUrl + '&nocache=' + Date.now());
                const text = await res.text();
                const rows = text.split(/\r?\n/).filter(r => r.trim().length > 10).slice(1);

                allFlights = rows.map(row => {
                    const cols = row.split(/[,;](?=(?:[^"]*"[^"]*")*[^"]*$)/);
                    // Nettoyage ultra-précis du code Airline
                    const rawAirline = cols[5] ? cols[5].replace(/["\s]/g, '').toLowerCase() : "";
                    const dest = cols[1]?.replace(/"/g, '').trim() || "";
                    
                    return {
                        date: cols[0]?.replace(/"/g, '').trim(),
                        dest: dest,
                        price: cols[2]?.replace(/"/g, '').trim(),
                        days: cols[3]?.replace(/"/g, '').trim(),
                        bag: cols[4]?.replace(/"/g, '').trim(),
                        logoUrl: logos[rawAirline] || null,
                        plan: cols[6]?.replace(/"/g, '').trim() || "Détails sur WhatsApp",
                        isOrg: dest.toLowerCase().includes('organisé'),
                        img: (cols[8] && cols[8].length > 10) ? cols[8].replace(/"/g, '').trim() : "https://images.unsplash.com/photo-1436491865332-7a61a109cc05?q=80&w=800"
                    };
                });
                renderFlights(allFlights);
            } catch (e) { console.error(e); }
        }

        function renderFlights(list) {
            const container = document.getElementById('flight-container');
            container.innerHTML = "";

            list.forEach(o => {
                const airlineImg = o.logoUrl 
                    ? `<div class="logo-box absolute top-4 right-4 z-10"><img src="${o.logoUrl}"></div>` 
                    : '';

                const badge = o.isOrg 
                    ? `<div class="tag-special text-white text-[9px] font-black px-4 py-2 rounded-full uppercase absolute top-4 left-4 z-10">Voyage Organisé</div>`
                    : `<div class="bg-slate-900/90 text-white text-[9px] font-black px-4 py-2 rounded-full uppercase absolute top-4 left-4 z-10 italic">Billet Flash</div>`;

                container.innerHTML += `
                <div class="card-flight shadow-sm">
                    <div class="relative h-56 overflow-hidden">
                        <img src="${o.img}" class="w-full h-full object-cover transition-transform duration-700 hover:scale-110">
                        ${badge}
                        ${airlineImg}
                    </div>
                    <div class="p-6 flex flex-col flex-grow">
                        <h4 class="text-2xl font-black text-slate-900 uppercase italic leading-tight mb-1">${o.dest}</h4>
                        <p class="text-slate-400 font-bold text-[10px] uppercase mb-4 tracking-wider">${o.date} — <span class="text-blue-600">${o.days}</span></p>
                        
                        <div class="bg-slate-50 p-5 rounded-2xl border border-slate-100 mb-6">
                            <div class="flex justify-between items-end mb-4">
                                <div>
                                    <p class="text-[8px] font-bold text-slate-400 uppercase mb-1">Tarif TTC</p>
                                    <span class="text-3xl font-black text-slate-900">${o.price} <small class="text-xs font-extrabold">DA</small></span>
                                </div>
                                <div class="text-right">
                                    <p class="text-[8px] font-bold text-slate-400 uppercase mb-1">Bagages</p>
                                    <span class="text-[11px] font-black text-slate-700 italic underline decoration-blue-500/30">${o.bag}</span>
                                </div>
                            </div>
                            <div class="border-t border-slate-200 pt-4 mt-2">
                                <p class="text-[9px] font-bold text-blue-600 uppercase mb-2 flex items-center">
                                    <i class="fas fa-plane mr-2"></i> Plan de vol & Infos :
                                </p>
                                <p class="text-[11px] text-slate-800 font-bold leading-relaxed whitespace-pre-line">${o.plan}</p>
                            </div>
                        </div>
                        
                        <a href="https://wa.me/213558332601?text=Salam Velora Travel, je souhaite réserver : ${o.dest} (${o.date})" 
                           target="_blank" 
                           class="mt-auto w-full bg-slate-900 hover:bg-slate-800 text-white py-4 rounded-xl font-black text-[11px] uppercase tracking-widest flex items-center justify-center gap-3 transition-all">
                            Réserver via <i class="fab fa-whatsapp text-2xl whatsapp-icon"></i>
                        </a>
                    </div>
                </div>`;
            });
        }

        function filterType(type) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + type).classList.add('active');
            if (type === 'all') renderFlights(allFlights);
            else if (type === 'organise') renderFlights(allFlights.filter(f => f.isOrg));
            else renderFlights(allFlights.filter(f => f.days.includes(type)));
        }

        init();
    </script>
</body>
</html>
