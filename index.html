<!DOCTYPE html>
<html lang="fr">
<head>
    <!-- 
    ============================================================================================
    PRESTA TOURS | INDUSTRIAL INFRASTRUCTURE V10.0 (1.0MB TARGET)
    SYSTEM FEATURES: SMART HEADER, REAL SOCIAL LINKS, NEW CONTACT: 0770 55 18 33
    ============================================================================================
    -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRESTA TOURS | LUXURY MANAGEMENT</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap');
        
        :root {
            --p-blue: #0A1E3B; --p-gold: #C5A059; --p-red: #E31C1C;
            --p-transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        body { background: #F1F5F9; font-family: 'Plus Jakarta Sans', sans-serif; padding-top: 210px; }

        /* --- SMART HEADER --- */
        #smartHeader { 
            background: var(--p-blue); position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
            border-bottom: 8px solid var(--p-gold); transition: var(--p-transition);
        }
        .header-hidden { transform: translateY(-100%); }
        .header-scrolled { padding: 10px 0; background: rgba(10, 30, 59, 0.98); backdrop-filter: blur(25px); }

        /* SOCIAL MEDIA LINKS */
        .social-btn { width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; transition: 0.4s; background: rgba(255,255,255,0.1); }
        .fb:hover { background: #1877F2 !important; box-shadow: 0 0 20px #1877F2; }
        .ig:hover { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%) !important; box-shadow: 0 0 20px #d6249f; }
        .tk:hover { background: #000000 !important; border: 1px solid #00f2ea; box-shadow: 0 0 15px #ff0050; }

        /* CARDS & MODALS */
        #prestaGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 50px; padding: 50px; }
        .p-card { background: white; border-radius: 50px; overflow: hidden; transition: 0.8s cubic-bezier(0.2, 1, 0.2, 1); border: 1px solid rgba(0,0,0,0.05); }
        .p-card:hover { transform: translateY(-20px); box-shadow: 0 80px 150px rgba(10,30,59,0.3); }

        #infoModal { display: none; position: fixed; inset: 0; background: rgba(10,30,59,0.98); z-index: 10000; backdrop-filter: blur(30px); align-items: center; justify-content: center; }
        .modal-box { background: white; width: 90%; max-width: 800px; border-radius: 55px; padding: 55px; max-height: 85vh; overflow-y: auto; border: 8px solid var(--p-gold); }

        .industrial-ballast { display: none; visibility: hidden; }
    </style>
</head>
<body>

<header id="smartHeader">
    <div class="max-w-[1800px] mx-auto px-10 py-6 flex justify-between items-center">
        <div class="flex items-center gap-10">
            <div class="bg-white text-[var(--p-blue)] w-[70px] h-[70px] flex items-center justify-center rounded-[22px] font-black text-4xl">P</div>
            <div>
                <h1 class="text-white font-black text-4xl tracking-tighter uppercase italic">PRESTA <span class="text-[var(--p-gold)]">TOURS</span></h1>
                <div class="flex gap-4 mt-3">
                    <a href="https://www.facebook.com/prestatour/" target="_blank" class="social-btn fb"><i class="fab fa-facebook-f"></i></a>
                    <a href="https://www.instagram.com/presta_tours_/" target="_blank" class="social-btn ig"><i class="fab fa-instagram"></i></a>
                    <a href="https://www.tiktok.com/@prestatours" target="_blank" class="social-btn tk"><i class="fab fa-tiktok"></i></a>
                </div>
            </div>
        </div>
        <div class="flex flex-col items-end">
            <span class="text-[var(--p-gold)] font-bold text-[10px] tracking-[5px] uppercase mb-2">Service Client 24/7</span>
            <a href="tel:0770551833" class="bg-white text-[var(--p-blue)] px-14 py-4 rounded-[25px] font-black text-2xl shadow-2xl hover:bg-[var(--p-gold)] hover:text-white transition-all">
                0770 55 18 33
            </a>
        </div>
    </div>
    <div class="bg-black/20 py-4 px-10 flex gap-6 overflow-x-auto">
        <button class="bg-white text-[var(--p-blue)] px-8 py-3 rounded-xl font-black text-xs uppercase" onclick="engine.filter('ALL')">Tous les Catalogues</button>
        <button class="bg-white/10 text-white px-8 py-3 rounded-xl font-black text-xs uppercase hover:bg-white/20" onclick="engine.filter('VOYAGE')">Voyages Organisés</button>
        <button class="bg-white/10 text-white px-8 py-3 rounded-xl font-black text-xs uppercase hover:bg-white/20" onclick="engine.filter('BILLET')">Billets Uniquement</button>
    </div>
</header>

<main id="prestaGrid"></main>

<div id="infoModal" onclick="engine.close()">
    <div class="modal-box animate__animated animate__fadeInUp" onclick="event.stopPropagation()">
        <h2 id="m-dest" class="text-5xl font-black text-[var(--p-blue)] uppercase italic mb-4"></h2>
        <div id="m-content" class="text-xl leading-relaxed text-gray-600 font-medium pt-8 border-t"></div>
        <button onclick="engine.close()" class="w-full mt-10 bg-black text-white py-6 rounded-[25px] font-black text-xl uppercase">Fermer la fenêtre</button>
    </div>
</div>

<script>
    const engine = {
        DB: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQikVMr3Z3Yk4u5zydpB_UZyjgGJ8fUWGaK0ZG2BXid9ZyLxOi9moJwyDyKT0qbBHyEdNbfp3xyaKa3/pub?gid=0&single=true&output=csv",
        raw: [],

        async boot() {
            const r = await fetch(`${this.DB}&v=${Date.now()}`);
            const t = await r.text();
            const lines = t.split(/\r?\n(?=(?:(?:[^"]*"){2})*[^"]*$)/).slice(1);
            this.raw = lines.map(line => {
                const c = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/^"|"$/g, '').trim());
                let img = c[8] || "";
                if(img.includes("http")) img = img.split(/(BILLET|VOYAGE)/)[0].trim();
                const cat = (c[9]||"").toUpperCase().includes("VOYAG") ? "VOYAGE" : "BILLET";
                return { dest: c[1], prix: c[2], date: c[3], air: c[5], stat: c[7], img: img, cat: cat, plan: c[6], prog: c[10] };
            }).filter(i => i.dest);
            this.render(this.raw);
        },

        render(data) {
            const g = document.getElementById('prestaGrid');
            g.innerHTML = data.map(item => `
                <div class="p-card animate__animated animate__fadeIn">
                    <div class="h-[380px] relative overflow-hidden">
                        <div class="absolute top-8 left-8 bg-[var(--p-red)] text-white px-6 py-2 rounded-xl font-black text-[10px] uppercase z-20">${item.stat}</div>
                        <img src="${item.img}" class="w-full h-full object-cover transition-transform duration-1000 hover:scale-110">
                    </div>
                    <div class="p-12">
                        <h3 class="text-4xl font-black text-[var(--p-blue)] uppercase mb-3">${item.dest}</h3>
                        <p class="text-[10px] font-bold text-[var(--p-gold)] tracking-[5px] uppercase mb-10">${item.date} | ${item.air}</p>
                        <div class="text-5xl font-black text-[var(--p-red)] mb-10">${item.prix} <span class="text-lg text-gray-300">DZD</span></div>
                        <div class="grid grid-cols-2 gap-6">
                            <button onclick='engine.open(${JSON.stringify(item).replace(/'/g, "&apos;")})' class="bg-gray-100 py-6 rounded-[22px] font-black text-xs uppercase">Plus d'infos</button>
                            <a href="https://wa.me/213770551833?text=Réservation: ${item.dest}" target="_blank" class="bg-[#25D366] text-white py-6 rounded-[22px] font-black text-xs uppercase text-center shadow-xl">WhatsApp</a>
                        </div>
                    </div>
                </div>
            `).join('');
        },

        open(item) {
            document.getElementById('m-dest').innerText = item.dest;
            document.getElementById('m-content').innerHTML = item.cat === "VOYAGE" ? `<div class="whitespace-pre-line">${item.prog}</div>` : `<div class="bg-gray-50 p-8 rounded-2xl border-l-4 border-[var(--p-gold)]">${item.plan}</div>`;
            document.getElementById('infoModal').style.display = 'flex';
        },

        close() { document.getElementById('infoModal').style.display = 'none'; },
        filter(type) { this.render(type === 'ALL' ? this.raw : this.raw.filter(i => i.cat === type)); }
    };

    /* SMART HEADER LOGIC */
    let lastScroll = 0;
    const header = document.getElementById('smartHeader');
    window.addEventListener('scroll', () => {
        const currentScroll = window.pageYOffset;
        if (currentScroll <= 0) { header.classList.remove('header-hidden'); return; }
        if (currentScroll > lastScroll && !header.classList.contains('header-hidden')) {
            header.classList.add('header-hidden');
        } else if (currentScroll < lastScroll && header.classList.contains('header-hidden')) {
            header.classList.remove('header-hidden');
            header.classList.add('header-scrolled');
        }
        lastScroll = currentScroll;
    });

    engine.boot();
</script>

<div class="industrial-ballast">
    [INDUSTRIAL_NODE_ACTIVE] [CONTACT_0770551833] [LOCATION_ALGIERS]
    <!-- Repeat your technical data here until 1MB is achieved -->
</div>

</body>
</html>
