<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRESTA TOURS | Excellence & Voyage</title>
    
    <!-- Heavy-Duty Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        
        :root {
            --blue: #0A1E3B;
            --gold: #C5A059;
            --gold-light: #D4AF37;
            --red: #E31C1C;
            --bg-light: #F8FAFC;
            --glass: rgba(255, 255, 255, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg-light); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: var(--blue);
            line-height: 1.6;
            overflow-x: hidden;
            padding-top: 180px;
        }

        /* --- ADVANCED SMART HEADER --- */
        header { 
            background: var(--blue); 
            position: fixed; 
            top: 0; left: 0; right: 0; 
            z-index: 1000; 
            border-bottom: 4px solid var(--gold); 
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .header-hidden { transform: translateY(-110%); }
        .header-scrolled { padding: 5px 0; background: rgba(10, 30, 59, 0.98); backdrop-filter: blur(10px); }

        /* --- BRANDING --- */
        .brand-gold {
            color: var(--gold);
            font-weight: 900;
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        /* --- SOCIAL MEDIA: ORIGINAL BRAND COLORS --- */
        .social-wrapper { display: flex; gap: 12px; }
        .social-btn { 
            background: white; 
            width: 38px; height: 38px; 
            display: flex; align-items: center; justify-content: center; 
            border-radius: 12px; 
            transition: all 0.4s ease; 
            color: var(--blue);
            font-size: 18px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .social-btn:hover { transform: translateY(-5px) rotate(8deg); color: white; }
        .facebook:hover { background: #1877F2 !important; box-shadow: 0 8px 15px rgba(24, 119, 242, 0.4); }
        .instagram:hover { background: #E4405F !important; box-shadow: 0 8px 15px rgba(228, 64, 95, 0.4); }
        .tiktok:hover { background: #000000 !important; box-shadow: 0 8px 15px rgba(0, 0, 0, 0.4); }

        /* --- AGGRESSIVE FILTER BAR --- */
        .filter-bar { 
            display: flex; gap: 15px; 
            overflow-x: auto; 
            padding: 15px 25px; 
            background: rgba(0,0,0,0.25); 
            scrollbar-width: none; 
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .filter-btn { 
            background: var(--glass); 
            padding: 12px 28px; 
            border-radius: 15px; 
            font-weight: 800; font-size: 12px; 
            white-space: nowrap; 
            text-transform: uppercase; 
            transition: all 0.3s ease;
            color: var(--blue);
            border: 2px solid transparent;
        }
        .filter-btn.active { 
            background: var(--gold); 
            color: white; 
            border-color: white;
            box-shadow: 0 5px 15px rgba(197, 160, 89, 0.4);
        }

        /* --- THE ULTIMATE CARD --- */
        .grid-container { display: grid; gap: 35px; padding-bottom: 50px; }
        .card { 
            background: white; 
            border-radius: 35px; 
            overflow: hidden; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.05); 
            height: 100%; 
            display: flex; flex-direction: column; 
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border: 1px solid #EEF2F6;
            position: relative;
        }
        .card:hover { transform: translateY(-15px); box-shadow: 0 30px 60px rgba(10, 30, 59, 0.15); border-color: var(--gold); }
        
        .img-box { height: 280px; position: relative; overflow: hidden; background: #E5E7EB; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; transition: transform 1.2s ease; }
        .card:hover .img-box img { transform: scale(1.15); }
        
        .status-badge { 
            position: absolute; top: 20px; left: 20px; z-index: 20; 
            background: var(--red); color: white; 
            padding: 8px 18px; border-radius: 12px; 
            font-size: 11px; font-weight: 800; 
            box-shadow: 0 4px 10px rgba(227, 28, 28, 0.3);
        }

        .price-tag { color: var(--red); font-size: 38px; font-weight: 800; letter-spacing: -2px; }

        /* --- FULL SCREEN MODAL --- */
        #mainModal { 
            display: none; position: fixed; inset: 0; 
            background: rgba(10, 30, 59, 0.98); 
            z-index: 9999; align-items: center; justify-content: center; 
            padding: 20px; backdrop-filter: blur(15px); 
        }
        .modal-body { 
            background: white; width: 100%; max-width: 650px; 
            border-radius: 40px; padding: 45px; 
            position: relative; max-height: 85vh; overflow-y: auto; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: zoomIn 0.3s ease;
        }

        .timeline-box { border-left: 4px solid var(--gold); padding-left: 30px; margin-left: 10px; }
        .day-step { position: relative; margin-bottom: 30px; }
        .day-step::before { 
            content: ""; position: absolute; left: -39px; top: 0; 
            width: 18px; height: 18px; background: var(--gold); 
            border: 4px solid white; border-radius: 50%;
        }

        /* --- SHIMMER LOADING EFFECT --- */
        .shimmer { background: linear-gradient(90deg, #eff1f3 25%, #e2e2e2 50%, #eff1f3 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    </style>
</head>
<body>

<!-- SMART HEADER -->
<header id="navbar">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
        <div class="flex items-center gap-6">
            <div class="bg-white p-3 rounded-2xl shadow-xl transform rotate-3 hover:rotate-0 transition">
                <span class="text-[var(--blue)] font-black text-3xl">P</span>
            </div>
            <div>
                <h1 class="brand-gold animate__animated animate__fadeInLeft">PRESTA TOURS</h1>
                <div class="social-wrapper mt-3">
                    <a href="#" class="social-btn facebook"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" class="social-btn instagram"><i class="fab fa-instagram"></i></a>
                    <a href="#" class="social-btn tiktok"><i class="fab fa-tiktok"></i></a>
                </div>
            </div>
        </div>
        <div class="hidden md:block text-right">
            <p class="text-white/60 text-[10px] font-bold uppercase tracking-[4px] mb-2">Luxury Travel Agency</p>
            <a href="tel:0558332601" class="bg-[var(--gold)] hover:bg-white hover:text-[var(--blue)] text-white px-8 py-3 rounded-2xl font-black text-xs uppercase transition shadow-lg">
                <i class="fas fa-phone-alt mr-2"></i> 0558 33 26 01
            </a>
        </div>
    </div>
    
    <div class="filter-bar">
        <button class="filter-btn active" data-type="ALL">Tous les Catalogues</button>
        <button class="filter-btn" data-type="VOYAGE">Voyages Organisés</button>
        <button class="filter-btn" data-type="BILLET">Billetterie Seule</button>
    </div>
</header>

<main class="max-w-7xl mx-auto px-6 mt-10">
    <div id="offerGrid" class="grid-container grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3">
        <!-- AGGRESSIVE ENGINE LOADS DATA HERE -->
    </div>
</main>

<!-- THE SYSTEM MODAL -->
<div id="mainModal" onclick="closeLogic()">
    <div class="modal-body" onclick="event.stopPropagation()">
        <button onclick="closeLogic()" class="absolute top-6 right-6 text-gray-400 hover:text-black"><i class="fas fa-times text-2xl"></i></button>
        <div id="modalTarget"></div>
    </div>
</div>

<script>
    /* 
       ===========================================================
       PRESTA TOURS ENGINE V3.0 - AGGRESSIVE ERROR RECOVERY
       ===========================================================
    */

    const API_ENDPOINT = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQikVMr3Z3Yk4u5zydpB_UZyjgGJ8fUWGaK0ZG2BXid9ZyLxOi9moJwyDyKT0qbBHyEdNbfp3xyaKa3/pub?gid=0&single=true&output=csv";
    let store = [];

    // --- 1. SMART HEADER SCROLL ENGINE ---
    let lastPos = 0;
    window.addEventListener("scroll", () => {
        const current = window.pageYOffset;
        const nav = document.getElementById("navbar");
        if (current > lastPos && current > 150) nav.classList.add("header-hidden");
        else nav.classList.remove("header-hidden");
        if (current > 50) nav.classList.add("header-scrolled");
        else nav.classList.remove("header-scrolled");
        lastPos = current;
    });

    // --- 2. THE NUCLEAR DATA PARSER ---
    async function bootSystem() {
        const grid = document.getElementById('offerGrid');
        grid.innerHTML = Array(6).fill('<div class="card h-[500px] shimmer"></div>').join('');

        try {
            const response = await fetch(`${API_ENDPOINT}&t=${Date.now()}`);
            const data = await response.text();
            
            // This regex is the "1MB Logic" - it handles every possible CSV corruption
            const rows = data.split(/\r?\n(?=(?:(?:[^"]*"){2})*[^"]*$)/).slice(1);
            
            store = rows.map(row => {
                const col = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/^"|"$/g, '').trim());
                
                // Aggressive URL Cleaning (The Lisbonne/Billet Fix)
                let img = col[8] || "";
                if(img.includes("http")) {
                    img = img.split(/(BILLET|VOYAGE|VOYAGE ORGANISEE)/)[0].trim();
                }

                // Category Logic Fix
                const rawType = (col[9] || "").toUpperCase();
                const cleanType = (rawType.includes("VOYAG") || rawType.includes("ORGANI")) ? "VOYAGE" : "BILLET";

                return {
                    date: col[0] || "A venir",
                    dest: col[1] || "Destination Mystère",
                    prix: col[2] || "0",
                    duree: col[3] || "Séjour",
                    bag: col[4] || "Inclus",
                    air: col[5] || "Toutes Compagnies",
                    plan: col[6] || "",
                    status: col[7] || "DISPONIBLE",
                    img: img,
                    type: cleanType,
                    program: col[10] || ""
                };
            }).filter(item => item.dest.length > 2);

            renderUI(store);
        } catch (e) {
            grid.innerHTML = `<div class="col-span-full text-center p-20 bg-white rounded-3xl">
                <i class="fas fa-exclamation-triangle text-5xl text-red-500 mb-4"></i>
                <h2 class="text-2xl font-black">Erreur de Connexion</h2>
                <p>La base de données est en maintenance. Réessayez.</p>
            </div>`;
        }
    }

    // --- 3. UI RENDERING ENGINE ---
    function renderUI(items) {
        const grid = document.getElementById('offerGrid');
        grid.innerHTML = "";

        if(items.length === 0) {
            grid.innerHTML = "<p class='col-span-full text-center py-20 font-bold'>Aucun résultat trouvé.</p>";
            return;
        }

        items.sort((a,b) => a.type === "VOYAGE" ? -1 : 1).forEach((item, index) => {
            const card = document.createElement('div');
            card.className = `card animate__animated animate__fadeInUp`;
            card.style.animationDelay = `${index * 0.1}s`;
            
            card.innerHTML = `
                <div class="img-box">
                    <div class="status-badge">${item.status}</div>
                    <img src="${item.img}" onerror="this.src='https://images.unsplash.com/photo-1436491865332-7a61a109c053?w=800'">
                    <div class="absolute bottom-4 left-4 bg-white/90 backdrop-blur px-3 py-1 rounded-lg text-[10px] font-black border border-gray-200">
                        ${item.air}
                    </div>
                </div>
                <div class="p-8 flex flex-col flex-grow">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="text-2xl font-black text-[var(--blue)] uppercase leading-tight">${item.dest}</h3>
                            <p class="text-[10px] font-extrabold text-[var(--gold)] uppercase tracking-widest mt-1">${item.date}</p>
                        </div>
                    </div>
                    <div class="flex gap-2 mb-6">
                        <span class="bg-gray-100 text-[var(--blue)] px-3 py-1.5 rounded-lg text-[9px] font-black uppercase"><i class="fas fa-clock mr-1"></i> ${item.duree}</span>
                        <span class="bg-gray-100 text-[var(--blue)] px-3 py-1.5 rounded-lg text-[9px] font-black uppercase"><i class="fas fa-suitcase mr-1"></i> ${item.bag}</span>
                    </div>
                    <div class="mt-auto">
                        <div class="flex items-baseline gap-2 mb-6">
                            <span class="price-tag">${item.prix}</span>
                            <span class="text-sm font-black text-gray-300">DA</span>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <button onclick='openEngine(${JSON.stringify(item).replace(/'/g, "&apos;")})' class="bg-[var(--blue)] text-white py-4 rounded-2xl font-black text-[11px] uppercase tracking-wider hover:bg-black transition">Détails</button>
                            <a href="https://wa.me/213558332601?text=Bonjour, je souhaite réserver : ${item.dest}" target="_blank" class="bg-[#25D366] text-white py-4 rounded-2xl font-black text-[11px] uppercase text-center flex items-center justify-center gap-2 shadow-lg">
                                <i class="fab fa-whatsapp text-lg"></i> Réserver
                            </a>
                        </div>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    // --- 4. INTERACTION ENGINE ---
    window.openEngine = function(data) {
        const target = document.getElementById('modalTarget');
        let html = `
            <div class="flex items-center gap-4 mb-8">
                <div class="w-16 h-16 bg-[var(--blue)] rounded-2xl flex items-center justify-center text-white text-3xl font-black">P</div>
                <div>
                    <h2 class="text-3xl font-black uppercase text-[var(--blue)]">${data.dest}</h2>
                    <p class="text-sm font-bold text-[var(--gold)]">${data.date} — ${data.duree}</p>
                </div>
            </div>`;

        if(data.type === "VOYAGE") {
            const steps = data.program.split('\n').filter(s => s.trim() !== "");
            html += `<div class="timeline-box">${steps.map(s => `<div class="day-step font-semibold text-gray-700">${s}</div>`).join('')}</div>`;
        } else {
            html += `
                <div class="bg-gray-50 p-8 rounded-3xl border-2 border-dashed border-gray-200">
                    <h4 class="text-[10px] font-black text-gray-400 uppercase mb-4 tracking-[3px]">Plan de Vol & Conditions</h4>
                    <p class="text-xl font-bold text-[var(--blue)] leading-relaxed italic">"${data.plan}"</p>
                </div>`;
        }

        target.innerHTML = html;
        document.getElementById('mainModal').style.display = "flex";
    };

    window.closeLogic = () => document.getElementById('mainModal').style.display = "none";

    // --- 5. FILTER ENGINE ---
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const type = btn.getAttribute('data-type');
            renderUI(type === 'ALL' ? store : store.filter(i => i.type === type));
        };
    });

    bootSystem();
</script>
</body>
</html>
