<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAZAR TRAVELS | Billet d'avion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0F172A; --accent: #3B82F6; --turkish-red: #E81932; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F1F5F9; scroll-behavior: smooth; }
        .nav-hazar { background: var(--primary); border-bottom: 4px solid var(--accent); position: sticky; top: 0; z-index: 100; }
        
        /* Branding High-End */
        .brand-red { color: var(--turkish-red); font-weight: 800; font-size: 11px; text-transform: uppercase; letter-spacing: 0.2em; }
        .airline-label { color: var(--turkish-red); font-weight: 800; font-size: 13px; text-transform: uppercase; border-left: 3px solid var(--turkish-red); padding-left: 12px; margin: 15px 0; }

        /* UI Interactive Elements */
        .filter-btn { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); color: #94A3B8; cursor: pointer; padding: 12px 24px; border-radius: 16px; font-weight: 800; font-size: 10px; text-transform: uppercase; border: 1px solid rgba(255,255,255,0.05); white-space: nowrap; }
        .filter-btn:hover { background: rgba(59, 130, 246, 0.1); color: white; }
        .filter-btn.active { background: var(--accent); color: white; box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4); border-color: var(--accent); }
        
        .card-flight { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-flight:hover { transform: translateY(-12px); box-shadow: 0 30px 60px -12px rgba(15, 23, 42, 0.15); }
        
        .img-container { height: 260px; overflow: hidden; position: relative; background: #E2E8F0; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; transition: transform 1s; }
        .card-flight:hover .img-container img { transform: scale(1.15); }
        
        .status-badge { position: absolute; top: 20px; left: 20px; z-index: 10; font-size: 10px; font-weight: 900; text-transform: uppercase; padding: 8px 16px; border-radius: 12px; color: white; backdrop-filter: blur(8px); }
    </style>
</head>
<body>

    <nav class="nav-hazar px-6 py-6 shadow-2xl">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
            <div class="flex items-center gap-5">
                <div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center text-slate-900 font-black text-3xl italic shadow-2xl">H</div>
                <div>
                    <h1 class="text-white font-black text-2xl uppercase italic tracking-tighter leading-none">Hazar Travels</h1>
                    <p class="brand-red mt-1">Billet d'avion</p>
                </div>
            </div>
            <div class="flex flex-wrap justify-center gap-3">
                <button onclick="handleFilter('all')" id="btn-all" class="filter-btn active">Toutes les offres</button>
                <button onclick="handleFilter('4')" id="btn-4" class="filter-btn">Billet de 4 Jours</button>
                <button onclick="handleFilter('7')" id="btn-7" class="filter-btn">Billet de 7 Jours</button>
                <button onclick="handleFilter('8')" id="btn-8" class="filter-btn">Billet de 8 Jours</button>
                <button onclick="handleFilter('organise')" id="btn-organise" class="filter-btn border-amber-500/30 text-amber-500">Voyages Organisés</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-16">
        <div id="display-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
            </div>
    </main>

    <script>
        const ENDPOINT = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQikVMr3Z3Yk4u5zydpB_UZyjgGJ8fUWGaK0ZG2BXid9ZyLxOi9moJwyDyKT0qbBHyEdNbfp3xyaKa3/pub?gid=0&single=true&output=csv";
        let store = [];

        async function boot() {
            try {
                const response = await fetch(`${ENDPOINT}&cache_bust=${Date.now()}`);
                const rawData = await response.text();
                const lines = rawData.split(/\r?\n/).filter(line => line.trim().length > 20);
                
                // Détecteur de structure dynamique
                const delimiter = lines[0].includes(';') ? ';' : ',';

                store = lines.slice(1).map(line => {
                    const data = line.split(delimiter).map(field => field.replace(/"/g, '').trim());
                    
                    const destination = data[1] || "Destination";
                    const daysRaw = data[3] || "";
                    const airlineRaw = (data[5] || "").toLowerCase();
                    
                    // Logic: Extraction numérique stricte pour éviter le bug "8 vs 18"
                    const dayId = daysRaw.replace(/\D/g, ""); 

                    let airlineName = data[5] || "Hazar Travels";
                    if (airlineRaw.includes("tk")) airlineName = "Turkish Airlines";
                    else if (airlineRaw.includes("ah")) airlineName = "Air Algérie";
                    else if (airlineRaw.includes("tu")) airlineName = "Tunisair";

                    return {
                        date: data[0] || "Date à venir",
                        title: destination,
                        price: data[2] || "Promo",
                        duration: daysRaw,
                        filterId: dayId,
                        luggage: data[4] || "2x23kg",
                        airline: airlineName,
                        details: data[6] || "",
                        isOrganized: line.toLowerCase().includes("organise") || destination.toLowerCase().includes("voyage"),
                        image: (data[8] && data[8].includes("http")) ? data[8] : "https://images.unsplash.com/photo-1436491865332-7a61a109cc05?w=800"
                    };
                }).filter(item => item.title !== "Destination");

                render(store);
            } catch (err) {
                console.error("System Error:", err);
            }
        }

        function render(items) {
            const grid = document.getElementById('display-grid');
            grid.innerHTML = items.length ? "" : `<div class="col-span-full text-center py-20 text-slate-400 font-bold uppercase tracking-widest">Aucune offre disponible actuellement</div>`;

            items.forEach(item => {
                grid.innerHTML += `
                <article class="card-flight bg-white rounded-[40px] overflow-hidden border border-slate-100 flex flex-col shadow-sm">
                    <div class="img-container">
                        <img src="${item.image}" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1436491865332-7a61a109cc05?w=800'">
                        <div class="status-badge ${item.isOrganized ? 'bg-amber-500' : 'bg-slate-900'} shadow-xl">
                            ${item.isOrganized ? 'Voyage Organisé' : 'Billet Flash'}
                        </div>
                    </div>
                    
                    <div class="p-10 flex flex-col flex-grow">
                        <h2 class="text-3xl font-black text-slate-900 uppercase italic tracking-tighter mb-1">${item.title}</h2>
                        <div class="flex items-center gap-2 mb-6">
                            <span class="text-slate-400 font-bold text-[11px] uppercase tracking-widest">${item.date}</span>
                            <span class="w-1 h-1 bg-slate-300 rounded-full"></span>
                            <span class="text-blue-600 font-black text-[11px] uppercase">${item.duration}</span>
                        </div>

                        <div class="airline-label">${item.airline}</div>

                        <div class="bg-slate-50 p-8 rounded-[32px] border border-slate-100 mb-8">
                            <div class="flex justify-between items-center mb-6">
                                <div>
                                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Prix Global</p>
                                    <p class="text-3xl font-black text-slate-900 tracking-tighter">${item.price} <small class="text-xs">DA</small></p>
                                </div>
                                <div class="text-right">
                                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Bagage</p>
                                    <p class="text-sm font-black text-slate-700 italic border-b-2 border-blue-200">${item.luggage}</p>
                                </div>
                            </div>
                            <div class="pt-6 border-t border-slate-200">
                                <p class="text-[11px] text-slate-600 font-bold italic leading-relaxed whitespace-pre-line">${item.details}</p>
                            </div>
                        </div>

                        <a href="https://wa.me/213558332601?text=Salam Hazar Travels, je suis intéressé par l'offre : ${item.title}" 
                           target="_blank" 
                           class="mt-auto w-full bg-slate-900 text-white py-6 rounded-2xl font-black text-[12px] uppercase tracking-widest flex items-center justify-center gap-4 hover:bg-slate-800 transition-all shadow-xl">
                            RÉSERVER MAINTENANT <i class="fab fa-whatsapp text-xl text-green-400"></i>
                        </a>
                    </div>
                </article>`;
            });
        }

        function handleFilter(category) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${category}`).classList.add('active');

            if (category === 'all') render(store);
            else if (category === 'organise') render(store.filter(i => i.isOrganized));
            else render(store.filter(i => i.filterId === category));
        }

        boot();
    </script>
</body>
</html>
